device:
  address: "31:C3:BD:32:14:7A"
  auto_reconnect: true
  reconnect_delay: 2.0
  mtu: 128
  rotate: 0
  brightness: 1.0
  timezone: auto
  scan_timeout: 6.0

panels:
  tile_width: 32
  tile_height: 32
  layout:
    columns: 1
    rows: 1
  list: ["31:C3:BD:32:14:7A"]

display:
  frame_interval: 0.1
  max_retries: 5
  log_notifications: true
  antialias_text: false

runtime:
  mode: clock
  preset: default
  options:
    timezone: "Europe/Amsterdam"
    
presets:
  clock:
    default:
      format: 24h
      theme: dark
      color: "#E2E8FF"
      accent: "#6E7DFF"
      background: "#000000"
      font: "aldopc"
      interval: 0.5
      dot_flashing: true
      dot_flash_period: 1.0
  text:
    default:
      color: "#FF0000"
      background: "#000000"
      font: null
      size: 16
      spacing: 1
      mode: static
      direction: left
      speed: 10.0
      gap: 32
      offset_x: 0
      offset_y: 0
      interval: 0.1
    marquee_left:
      color: "#00FFAA"
      background: "#000000"
      mode: scroll
      direction: left
      speed: 10.0
      step: 1
      gap: 32
      size: 16
      spacing: 2
      offset_y: 0
      interval: 0.1
    marquee_right:
      color: "#FFFFFF"
      background: "#000000"
      mode: scroll
      direction: right
      speed: 10.0
      step: 1
      gap: 48
      size: 16
      spacing: 1
      offset_y: 0
      interval: 0.1
  image:
    default:
      mode: fit
      rotate: 0
      mirror: false
      invert: false
  counter:
    default:
      start: 0
      count: 10
      delay: 1.0
